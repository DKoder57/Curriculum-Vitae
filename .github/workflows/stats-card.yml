name: Update GitHub Stats Card

on:
  schedule:
    - cron: "0 3 * * *"   # todo dia às 03:00 UTC
  workflow_dispatch:       # permite rodar manualmente pela aba Actions

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (para ler este workflow)
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout output (onde o SVG será commitado)
        uses: actions/checkout@v4
        with:
          ref: output
          path: output

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=DKoder57&show_icons=true&theme=radical&hide_border=true
          path: main/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit to output branch
        run: |
          cp main/stats.svg output/stats.svg
          cd output
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.svg
          git commit -m "Update stats card" || exit 0
          git push origin output
